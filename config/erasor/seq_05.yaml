# Ported from github.com/LimHyungTae/ERASOR/blob/master/config/seq_05.yaml.
# Algorithm parameters match the upstream v1 config (paper Table II row).
start_frame: 2350
end_frame: 2670
is_large_scale: true

dataloader:
    dataset_name: "SemanticKITTI"
    # Edit the two abs_* paths below for your machine.
    # abs_data_dir = <kitti_dir>/dataset/sequences ; abs_save_dir is where
    # mapgen + run_erasor write the GT and estimated PCDs.
    abs_data_dir: "/home/url/datasets/kitti/dataset/sequences"
    sequence: "05"
    abs_save_dir: "/home/url/datasets/erasor2_outputs/SemanticKITTI"
    accum_interval: 2
    voxel_size: 0.2

erasor:
    max_range: 60.0
    num_rings: 15
    num_sectors: 60
    min_h: -1.3
    max_h: 3.2
    th_bin_max_h: 0.05
    scan_ratio_threshold: 0.3
    minimum_num_pts: 10
    rejection_ratio: 0
    gf_dist_thr: 0.15
    gf_iter: 3
    gf_num_lpr: 10
    gf_th_seeds_height: 0.5
    map_voxel_size: 0.05

rerun:
    enabled: true
    spawn: true
    save_path: ""
