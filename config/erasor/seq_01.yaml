# Ported from github.com/LimHyungTae/ERASOR/blob/master/config/seq_01.yaml.
# Algorithm parameters match the upstream v1 config (paper Table II row).
start_frame: 150
end_frame: 250
is_large_scale: true

dataloader:
    dataset_name: "SemanticKITTI"
    abs_data_dir: "/home/url/datasets/kitti/dataset/sequences"
    sequence: "01"
    abs_save_dir: "/home/url/datasets/erasor2_outputs/SemanticKITTI"
    # seq 01's upstream bag is `01_150_to_250_w_interval_1_node.bag` and the
    # paper-benchmark mapgen was built from every scan. accum_interval=1
    # here matches that, producing `01_150_to_250_w_interval_1_voxel_0_2.pcd`
    # which run_erasor will load as the initial map. Other seqs (00, 02,
    # 05, 07) all ship interval_2 bags so they stay at accum_interval=2.
    accum_interval: 1
    voxel_size: 0.2

erasor:
    version: 3
    max_range: 60.0
    num_rings: 15
    num_sectors: 108
    min_h: -1.3
    max_h: 3.0
    th_bin_max_h: 0.2
    scan_ratio_threshold: 0.2
    minimum_num_pts: 6
    rejection_ratio: 0
    gf_dist_thr: 0.15
    gf_iter: 3
    gf_num_lpr: 10
    gf_th_seeds_height: 0.5
    map_voxel_size: 0.2
    query_voxel_size: 0.2
    removal_interval: 1

rerun:
    enabled: true
    spawn: true
    save_path: ""
