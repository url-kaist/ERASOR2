# Ported from github.com/LimHyungTae/ERASOR/blob/master/config/seq_00.yaml.
# Algorithm parameters match the upstream v1 config (paper Table II row).
start_frame: 4390
end_frame: 4530
is_large_scale: true

dataloader:
    dataset_name: "SemanticKITTI"
    # Edit the two abs_* paths below for your machine.
    # abs_data_dir = <kitti_dir>/dataset/sequences ; abs_save_dir is where
    # mapgen + run_erasor write the GT and estimated PCDs.
    abs_data_dir: "/home/url/datasets/kitti/dataset/sequences"
    sequence: "00"
    abs_save_dir: "/home/url/datasets/erasor2_outputs/SemanticKITTI"
    accum_interval: 2
    voxel_size: 0.2

erasor:
    version: 3
    max_range: 80.0
    num_rings: 20
    num_sectors: 108
    min_h: -1.3
    max_h: 3.0
    th_bin_max_h: 0.2
    scan_ratio_threshold: 0.2
    minimum_num_pts: 6
    rejection_ratio: 0
    gf_dist_thr: 0.15
    gf_iter: 3
    gf_num_lpr: 20
    gf_th_seeds_height: 0.5
    map_voxel_size: 0.2
    query_voxel_size: 0.2
    removal_interval: 4

rerun:
    enabled: true
    spawn: true
    save_path: ""
