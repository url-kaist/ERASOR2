# SemanticKITTI seq 08 -- not part of the original ERASOR2 paper
# benchmark (the paper reports 00, 01, 02, 05, 07). Frame range is a
# starting point you may want to retune for high-dynamic content; the
# default below covers a ~200-frame window through downtown traffic.
start_frame: 1500
end_frame: 1700
viz_interval: 10
is_large_scale: true

dataloader:
    run_traj_clustering: false
    dataset_name: "SemanticKITTI"
    # Edit the two abs_* paths below for your machine.
    # `abs_data_dir` is <kitti_dir>/dataset/sequences (i.e. directly contains
    # the per-sequence folders 00/, 01/, ... 21/). `abs_save_dir` is where
    # mapgen + run_erasor2 write the GT and estimated PCDs.
    abs_data_dir: "/home/url/datasets/kitti/dataset/sequences"
    cloud_dir: ""
    cloud_format: ""
    pose_path: ""
    sequence: "08"
    abs_save_dir: "/home/url/datasets/erasor2_outputs/SemanticKITTI"
    instance_seg_method: "hdbscan"

    accum_interval: 2
    voxel_size: 0.2
    map_voxel_size: 0.2

    expansion_range: 0 # It is only needed for HeLiPR

erasor2:
    grid_resolution: 2.0
    egocentric_grid_resolution: 0.6
    range_of_interest: 60.0
    min_z_voi: -3.0
    max_z_voi: 1.5
    min_z_diff_thr: 0.4
    scan_ratio_threshold: 0.2
    log_odds:
        increment_gain: 2.0
        increment: 0.15
    region_proposal_thr: 0.8
    kernel_size: 1

    ratio_num_pts: 0.95
    minimum_num_pts: 5

    moving_object_detection:
        negative_log_odds: -2.0
        obj_score_soft_thr: 0.8
        obj_score_hard_thr: 14.0
        hard_thr_radius: 10.0

    over_segmentation:
        minimum_area_thr: 56
        ratio_of_unknown_prior: 0.25

    volumetric_outlier_removal:
        window_size: 1
        use_adaptive_voxel_size: true
        vor_cand_score_thr: 3.0
        dist_thr_gain: 1.732

    viz_flag:
        set_scan_and_pose: true
        set_submap: false
        update: true
        detect: true
        over_seg: true

    save_map: true

stop_for_each_frame: false

extrinsic:
    robot_body_size: 2.7
    sensor_height: 1.73
    rotation: [ 1, 0, 0,
                0, 1, 0,
                0, 0, 1 ]
    translation: [ 0.0, 0.0, 0.0 ]
