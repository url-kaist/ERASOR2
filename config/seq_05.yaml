start_frame: 2350
end_frame: 2670
viz_interval: 10
is_large_scale: true

dataloader:
    run_traj_clustering: false
    dataset_name: "SemanticKITTI"
    # Edit the two abs_* paths below for your machine.
    # `abs_data_dir` is <kitti_dir>/dataset/sequences (i.e. directly contains
    # the per-sequence folders 00/, 01/, ... 21/). `abs_save_dir` is where
    # mapgen + run_erasor2 write the GT and estimated PCDs.
    abs_data_dir: "/home/url/datasets/kitti/dataset/sequences"
    cloud_dir: ""
    cloud_format: ""
    pose_path: ""
    sequence: "05"
    abs_save_dir: "/home/url/datasets/erasor2_outputs/SemanticKITTI"
    instance_seg_method: "hdbscan"

    accum_interval: 2
    voxel_size: 0.2
    map_voxel_size: 0.2

    expansion_range: 0 # It is only needed for HeLiPR

erasor2:
    grid_resolution: 2.0
    egocentric_grid_resolution: 0.6
    range_of_interest: 60.0
    # min_z_voi 와 max_z_voi 는 raw cloud 기준 (ERASOR 1.0과 다름!!!)
    min_z_voi: -3.0
    max_z_voi: 1.5
    min_z_diff_thr: 0.4 # 물체가 존재한다고 가정할 수 있는 최소한의 z 차이
    scan_ratio_threshold: 0.2 # The Larger, the more aggressive!!
    log_odds:
        increment_gain: 2.0 # Should be larger than one
        increment: 0.15
    region_proposal_thr: 0.8
    kernel_size: 1

    # For checking ground likelihood
    ratio_num_pts: 0.95 # Percentage
    minimum_num_pts: 5

    # For detection moving objects
    moving_object_detection:
        negative_log_odds: -2.0
        obj_score_soft_thr: 0.8
        obj_score_hard_thr: 14.0
        hard_thr_radius: 10.0

    # To manage over-segmented parts
    over_segmentation:
        minimum_area_thr: 56 # [m^2]
        ratio_of_unknown_prior: 0.25

    # To manage under-segmented parts
    volumetric_outlier_removal:
        window_size: 1
        use_adaptive_voxel_size: true
        vor_cand_score_thr: 3.0 # Larger than `obj_score_soft_thr` and smaller than `obj_score_hard_thr`
        dist_thr_gain: 1.732 # The larger, the more aggressive

    viz_flag:
        # Flip these on to stream per-step results to rerun while running:
        #   set_scan_and_pose : raw scan + ground/non-ground/noise split
        #   update            : VoI + submap occupancy grid each frame
        #   detect            : per-frame dynamic / static / noise candidates
        #   over_seg          : over-segmented object instances (colorised)
        #   set_submap        : reserved; no publish hooks yet
        set_scan_and_pose: true
        set_submap: false
        update: true
        detect: true
        over_seg: true

    save_map: true

# When true, the binary blocks on cin.ignore() between frames so you can
# inspect the rerun viewer interactively. Keep false for unattended runs.
stop_for_each_frame: false

extrinsic:
    robot_body_size: 2.7
    sensor_height: 1.73
    rotation: [ 1, 0, 0,
                0, 1, 0,
                0, 0, 1 ]
    translation: [ 0.0, 0.0, 0.0 ]
